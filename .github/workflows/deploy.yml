name: Deploy Next.js to GitHub Pages

on:
  push:
    branches:
      - main # Memicu deploy otomatis saat push ke branch main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          static_site_generator: next

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Clean Cache and Build Next.js app
        # Menghapus folder cache .next lokal dan folder out lama sebelum melakukan compile baru
        run: |
          rm -f next.config.js
          rm -rf .next out
          npm run build
          echo "=== VERIFIKASI ISI FOLDER OUT ==="
          ls -la out
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out # Hasil kompilasi static export Next.js murni

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
